<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; overflow: hidden; }
        .topo { background: #1e293b; color: white; padding: 10px; text-align: center; }
        .main-container { display: flex; height: calc(100vh - 50px); }
        #canvas-container { flex: 2; position: relative; background: white; }
        .feedback-mestre { 
            position: absolute; bottom: 0; width: 100%; padding: 20px; 
            font-size: 22px; font-weight: bold; text-align: center; 
            border-top: 4px solid #cbd5e1; box-sizing: border-box;
        }
        .painel-lateral { flex: 0.7; background: #ffffff; border-left: 2px solid #e2e8f0; padding: 20px; overflow-y: auto; }
        .input-box { display: flex; flex-direction: column; font-size: 14px; margin-bottom: 12px; font-weight: 600; }
        .card-fisica { background: #f8fafc; border-radius: 8px; padding: 15px; border: 1px solid #cbd5e1; }
        button { width: 100%; padding: 12px; cursor: pointer; background: #10b981; color: white; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div class="topo"><h2 style="margin:0">🔬 Plano Inclinado: Laboratório de Dinâmica</h2></div>

<div class="main-container">
    <div id="canvas-container">
        <div id="msgMestre" class="feedback-mestre">Clique e arraste o bloco!</div>
    </div>

    <div class="painel-lateral">
        <div class="input-box">Ângulo (θ): <input type="range" id="ang" min="0" max="60" value="30"> <span id="lAng">30°</span></div>
        <div class="input-box">Atrito (μe): <input type="range" id="mue" min="0" max="1" step="0.01" value="0.40"> <span id="lMue">0.40</span></div>
        <div class="input-box">Força Aplicada (F): <input type="range" id="fext" min="-250" max="250" value="0"> <span id="lFext">0 N</span></div>
        <button onclick="resetar()">Parar Bloco</button>
        
        <div class="card-fisica" style="margin-top: 20px;">
            <p>Px: <span id="valPx">0</span> N | Fat Máx: <span id="valFatMax">0</span> N</p>
            <p>Resultante: <span id="valFres">0</span> N</p>
        </div>
    </div>
</div>

<script>
let posX = 100, vel = 0, acel = 0;
let m = 10, g = 9.8;
let arrastando = false;

function setup() {
    let container = document.getElementById('canvas-container');
    let cnv = createCanvas(container.offsetWidth, container.offsetHeight - 80);
    cnv.parent('canvas-container');
}

function draw() {
    background(255);
    
    let ang = radians(float(document.getElementById('ang').value));
    let mue = float(document.getElementById('mue').value);
    let fext = float(document.getElementById('fext').value);
    
    // Cálculos de Física
    let px = m * g * sin(ang);
    let py = m * g * cos(ang);
    let fatMax = mue * py;
    let fMotora = fext - px;
    let fat = 0;

    let msg = document.getElementById('msgMestre');
    
    if (arrastando) {
        // Lógica de arraste simplificada para evitar que o bloco suma
        let d = dist(mouseX, mouseY, 50, height-20);
        posX = d - 30; 
        vel = 0; acel = 0;
        msg.innerText = "📍 POSICIONANDO...";
        msg.style.background = "#ddd6fe";
    } else {
        // Lógica de Movimento
        if (abs(vel) < 0.1) {
            if (abs(fMotora) > fatMax) {
                fat = fatMax * (fMotora > 0 ? -1 : 1);
                acel = (fMotora + fat) / m;
            } else {
                vel = 0; acel = 0;
                msg.innerText = "⚖️ EQUILÍBRIO";
                msg.style.background = "#f1f5f9";
            }
        } else {
            fat = (mue * 0.8 * py) * (vel > 0 ? -1 : 1);
            acel = (fMotora + fat) / m;
            msg.innerText = vel > 0 ? "🔼 SUBINDO" : "🔽 DESCENDO";
            msg.style.background = vel > 0 ? "#60a5fa" : "#fb923c";
        }
        vel += acel * 0.15;
        posX += vel;
    }

    // Segurança: Não deixa o bloco fugir da rampa
    posX = constrain(posX, 0, width);

    // Atualiza Painel
    document.getElementById('lAng').innerText = document.getElementById('ang').value + "°";
    document.getElementById('lMue').innerText = mue.toFixed(2);
    document.getElementById('lFext').innerText = fext + " N";
    document.getElementById('valPx').innerText = px.toFixed(1);
    document.getElementById('valFatMax').innerText = fatMax.toFixed(1);
    document.getElementById('valFres').innerText = (fext - px).toFixed(1);

    // --- DESENHO ---
    translate(50, height - 20);
    
    // Rampa
    fill(240); stroke(150);
    triangle(0, 0, width, 0, width, -width * tan(ang));
    
    rotate(-ang);
    stroke(0); strokeWeight(4);
    line(0, 0, width * 2, 0); // Superfície

    // Bloco
    fill(arrastando ? "#8b5cf6" : "#3b82f6");
    stroke(0); strokeWeight(2);
    rect(posX, -40, 60, 40, 5);

    // Vetores (Apenas se não estiver arrastando)
    if (!arrastando) {
        desenharSeta(posX+30, -20, fext, [0, 200, 0], "F");
        desenharSeta(posX+30, -20, -px, [255, 0, 0], "Px");
    }
}

function desenharSeta(x, y, forca, cor, label) {
    if (abs(forca) < 5) return;
    stroke(cor); fill(cor);
    let tam = forca * 0.8;
    line(x, y, x + tam, y);
    push(); translate(x+tam, y); rotate(forca > 0 ? 0 : PI);
    triangle(0,0, -8, -4, -8, 4); pop();
}

function mousePressed() {
    // Verifica se o clique foi "perto" do bloco
    let ang = radians(float(document.getElementById('ang').value));
    let mx = (mouseX - 50) * cos(ang) - (mouseY - (height - 20)) * -sin(ang);
    if (abs(mx - (posX + 30)) < 60) {
        arrastando = true;
    }
}

function mouseReleased() { arrastando = false; }
function resetar() { vel = 0; acel = 0; }
</script>
</body>
</html>
